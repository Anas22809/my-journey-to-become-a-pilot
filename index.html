<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خطتي لأصبح طيار</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-950:#08111f;
    --navy-900:#0b1a2e;
    --navy-800:#122a49;
    --navy-700:#1a3a63;
    --sky-500:#3b93d6;
    --sky-300:#7ec1ec;
    --gold-400:#f0b429;
    --gold-300:#ffd166;
    --cloud-50:#f4f8fb;
    --slate-400:#8ea0bb;
    --slate-500:#6c7f9c;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 900px 500px at 20% -10%, #163156 0%, transparent 60%),
      radial-gradient(ellipse 700px 400px at 100% 0%, #1c3d68 0%, transparent 55%),
      linear-gradient(180deg, var(--navy-950) 0%, var(--navy-900) 100%);
    min-height:100vh;
    font-family:'Tajawal', sans-serif;
    color:var(--cloud-50);
    padding:32px 16px 80px;
  }
  .app{max-width:640px;margin:0 auto;}

  /* header */
  .eyebrow{
    font-family:'Cairo',sans-serif;
    font-weight:700;
    font-size:13px;
    letter-spacing:.5px;
    color:var(--gold-300);
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:10px;
  }
  .eyebrow::before{content:"✈";font-size:14px;}
  h1{
    font-family:'Cairo',sans-serif;
    font-weight:900;
    font-size:clamp(26px,6vw,36px);
    margin:0 0 8px;
    line-height:1.25;
    background:linear-gradient(90deg,#fff, var(--sky-300));
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
  }
  .subtitle{
    color:var(--slate-400);
    font-size:15px;
    margin:0 0 28px;
    line-height:1.7;
  }

  /* progress panel */
  .progress-panel{
    background:linear-gradient(135deg, var(--navy-800), var(--navy-700));
    border:1px solid rgba(255,255,255,.06);
    border-radius:18px;
    padding:18px 20px;
    margin-bottom:36px;
    position:relative;
    overflow:hidden;
  }
  .progress-panel::after{
    content:"";
    position:absolute;
    inset:0;
    background:repeating-linear-gradient(90deg, transparent, transparent 18px, rgba(255,255,255,.02) 18px, rgba(255,255,255,.02) 19px);
    pointer-events:none;
  }
  .progress-top{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:12px;
  }
  .progress-count{
    font-family:'Cairo',sans-serif;
    font-weight:800;
    font-size:22px;
    color:var(--gold-300);
  }
  .progress-count span{font-size:14px;color:var(--slate-400);font-weight:500;}
  .progress-pct{
    font-family:'Cairo',sans-serif;
    font-weight:700;
    font-size:14px;
    color:var(--sky-300);
  }
  .runway{
    height:10px;
    border-radius:6px;
    background:rgba(255,255,255,.08);
    overflow:hidden;
    position:relative;
  }
  .runway-fill{
    height:100%;
    border-radius:6px;
    background:linear-gradient(90deg, var(--sky-500), var(--gold-400));
    width:0%;
    transition:width .5s cubic-bezier(.4,0,.2,1);
  }
  .reset-btn{
    margin-top:14px;
    background:none;
    border:1px solid rgba(255,255,255,.15);
    color:var(--slate-400);
    font-family:'Tajawal',sans-serif;
    font-size:12px;
    padding:6px 12px;
    border-radius:999px;
    cursor:pointer;
    transition:.2s;
  }
  .reset-btn:hover{border-color:var(--sky-300);color:var(--sky-300);}

  /* timeline */
  .timeline{position:relative;}
  .line-track{
    position:absolute;
    top:4px;
    bottom:4px;
    right:19px;
    width:3px;
    background:rgba(255,255,255,.08);
    border-radius:3px;
  }
  .line-fill{
    position:absolute;
    top:0;
    right:0;
    width:100%;
    height:0%;
    background:linear-gradient(180deg, var(--sky-500), var(--gold-400));
    border-radius:3px;
    transition:height .6s cubic-bezier(.4,0,.2,1);
  }
  .plane-marker{
    position:absolute;
    right:9px;
    font-size:20px;
    transform:translateY(-50%) rotate(90deg);
    transition:top .6s cubic-bezier(.4,0,.2,1);
    filter:drop-shadow(0 0 6px rgba(240,180,41,.7));
    z-index:5;
  }

  .step{
    position:relative;
    display:flex;
    align-items:flex-start;
    gap:16px;
    padding-bottom:26px;
  }
  .step:last-child{padding-bottom:0;}
  .marker{
    flex:0 0 40px;
    width:40px;
    height:40px;
    border-radius:50%;
    background:var(--navy-800);
    border:2px solid var(--sky-500);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Cairo',sans-serif;
    font-weight:800;
    font-size:14px;
    color:var(--sky-300);
    position:relative;
    z-index:2;
    transition:.35s;
    flex-shrink:0;
  }
  .step.done .marker{
    background:var(--gold-400);
    border-color:var(--gold-300);
    color:var(--navy-950);
    box-shadow:0 0 0 4px rgba(240,180,41,.15);
  }
  .marker .num{transition:opacity .2s;}
  .marker .check{
    position:absolute;
    opacity:0;
    transform:scale(.5);
    transition:.25s;
  }
  .step.done .marker .num{opacity:0;}
  .step.done .marker .check{opacity:1;transform:scale(1);}

  .card{
    flex:1;
    background:var(--navy-800);
    border:1px solid rgba(255,255,255,.07);
    border-radius:14px;
    padding:14px 16px;
    cursor:pointer;
    user-select:none;
    transition:.25s;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }
  .card:hover{border-color:rgba(255,255,255,.18);transform:translateX(-2px);}
  .step.done .card{
    background:linear-gradient(135deg, rgba(240,180,41,.12), var(--navy-800));
    border-color:rgba(240,180,41,.4);
  }
  .card-main{display:flex;align-items:center;gap:12px;}
  .card-emoji{font-size:24px;flex-shrink:0;}
  .card-title{
    font-family:'Cairo',sans-serif;
    font-weight:700;
    font-size:15px;
    line-height:1.5;
    color:var(--cloud-50);
    transition:.25s;
  }
  .step.done .card-title{color:var(--gold-300);}
  .card-tick{
    flex-shrink:0;
    width:24px;
    height:24px;
    border-radius:50%;
    border:2px solid var(--slate-500);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:13px;
    color:transparent;
    transition:.25s;
  }
  .step.done .card-tick{
    background:var(--gold-400);
    border-color:var(--gold-400);
    color:var(--navy-950);
  }

  .footer-note{
    text-align:center;
    color:var(--slate-500);
    font-size:12.5px;
    margin-top:36px;
    line-height:1.8;
  }

  @media (max-width:420px){
    .card-title{font-size:13.5px;}
    .card-emoji{font-size:20px;}
  }
</style>
</head>
<body>
<div class="app">
  <div class="eyebrow">مسار مهني</div>
  <h1>خطتي لأصبح طيار</h1>
  <p class="subtitle">١٦ محطة من شهادة الثانوية إلى مقعد القيادة. اضغط على أي هدف عند تحقيقه ليتحول إلى ذهبي 🏆</p>

  <div class="progress-panel">
    <div class="progress-top">
      <div class="progress-count"><span id="doneCount">0</span> / 16 <span>هدف مكتمل</span></div>
      <div class="progress-pct" id="pctLabel">٠٪</div>
    </div>
    <div class="runway"><div class="runway-fill" id="runwayFill"></div></div>
    <button class="reset-btn" id="resetBtn">إعادة تعيين التقدم</button>
  </div>

  <div class="timeline" id="timeline">
    <div class="line-track">
      <div class="line-fill" id="lineFill"></div>
    </div>
    <div class="plane-marker" id="planeMarker" style="top:0%;">✈️</div>
    <!-- steps injected by JS -->
  </div>

  <p class="footer-note">يتم حفظ تقدمك تلقائيًا على هذا الجهاز ✦ اضغط على أي بطاقة أو الدائرة بجانبها للتبديل</p>
</div>

<script>
const steps = [
  {id:1, emoji:"🏅🎓", title:"الحصول على البكالوريا بمعدل متميز"},
  {id:2, emoji:"🗣️🇩🇪", title:"دراسة اللغة الألمانية والحصول على شهادة معتمدة"},
  {id:3, emoji:"📋✉️", title:"تجهيز الأوراق والتقديم للسفارة الألمانية"},
  {id:4, emoji:"✈️", title:"السفر إلى ألمانيا"},
  {id:5, emoji:"📚🏛️", title:"دراسة البكالوريوس"},
  {id:6, emoji:"🎓📜", title:"الحصول على شهادة البكالوريوس"},
  {id:7, emoji:"💼🔧", title:"العمل وتجميع خبرة سنة أو سنتين"},
  {id:8, emoji:"🛂🇩🇪", title:"الحصول على الجنسية الألمانية"},
  {id:9, emoji:"🌴✈️", title:"السفر إلى الخليج والعمل هناك"},
  {id:10, emoji:"💰🧾", title:"ادخار المال وتجميع مبلغ دراسة الطيران"},
  {id:11, emoji:"🎓🛩️", title:"التسجيل في أكاديمية طيران"},
  {id:12, emoji:"🎫📄", title:"الحصول على رخصة الطيران"},
  {id:13, emoji:"🔍📈", title:"البحث عن عمل وتجميع ساعات طيران"},
  {id:14, emoji:"✈️📊", title:"التقديم على وظيفة في شركة طيران كبيرة وفخمة"},
  {id:15, emoji:"🌍💼", title:"العمل في شركة طيران كبيرة وراتب محترم"},
  {id:16, emoji:"🏆✈️", title:"الترقية إلى كابتن طيار"}
];

const STORAGE_KEY = "pilot-journey-progress";
let completed = new Set();

const timelineEl = document.getElementById("timeline");
const doneCountEl = document.getElementById("doneCount");
const pctLabelEl = document.getElementById("pctLabel");
const runwayFillEl = document.getElementById("runwayFill");
const lineFillEl = document.getElementById("lineFill");
const planeMarkerEl = document.getElementById("planeMarker");

function arabicPercent(n){
  const map = {"0":"٠","1":"١","2":"٢","3":"٣","4":"٤","5":"٥","6":"٦","7":"٧","8":"٨","9":"٩"};
  return String(n).split("").map(c => map[c] !== undefined ? map[c] : c).join("");
}

function render(){
  timelineEl.querySelectorAll(".step").forEach(el => el.remove());
  steps.forEach((s, idx) => {
    const stepEl = document.createElement("div");
    stepEl.className = "step" + (completed.has(s.id) ? " done" : "");
    stepEl.innerHTML = `
      <div class="marker">
        <span class="num">${idx+1}</span>
        <span class="check">✓</span>
      </div>
      <div class="card" data-id="${s.id}">
        <div class="card-main">
          <span class="card-emoji">${s.emoji}</span>
          <span class="card-title">${s.title}</span>
        </div>
        <div class="card-tick">✓</div>
      </div>
    `;
    stepEl.querySelector(".card").addEventListener("click", () => toggle(s.id));
    stepEl.querySelector(".marker").addEventListener("click", () => toggle(s.id));
    timelineEl.appendChild(stepEl);
  });
  updateProgress();
}

function updateProgress(){
  const total = steps.length;
  const doneN = completed.size;
  const pct = Math.round((doneN/total)*100);
  doneCountEl.textContent = doneN;
  pctLabelEl.textContent = arabicPercent(pct) + "٪";
  runwayFillEl.style.width = pct + "%";
  lineFillEl.style.height = pct + "%";
  planeMarkerEl.style.top = pct + "%";
}

function toggle(id){
  if(completed.has(id)) completed.delete(id);
  else completed.add(id);
  render();
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(Array.from(completed)));
  }catch(e){ console.error("Storage save failed", e); }
}

function loadProgress(){
  try{
    const saved = localStorage.getItem(STORAGE_KEY);
    if(saved){
      completed = new Set(JSON.parse(saved));
    }
  }catch(e){
    console.error("Storage load failed", e);
  }
  render();
}

document.getElementById("resetBtn").addEventListener("click", () => {
  completed = new Set();
  render();
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify([]));
  }catch(e){ console.error("Storage reset failed", e); }
});

loadProgress();
</script>
</body>
</html>
